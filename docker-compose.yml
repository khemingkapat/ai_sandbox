volumes:
  etc_munge:
  slurm_state:

services:
  slurmctld:
    build:
      context: .
      dockerfile: Dockerfile.slurm
    image: local-slurm:latest
    container_name: slurmctld
    hostname: slurmctld
    privileged: true
    security_opt:
      - seccomp:unconfined
    # Phase 1 Fix: Start in a directory the user actually owns
    working_dir: /home/sandbox-user
    command: ["slurmctld"]
    volumes:
      - etc_munge:/etc/munge
      - slurm_state:/var/spool/slurmctld
      - ./data:/data
      - ./data/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./storage/users:/mnt/storage/users
      - ./storage/projects:/mnt/storage/projects
      - ./storage/public:/mnt/storage/public
    networks:
      - slurm_net

  worker1: &worker_base
    image: local-slurm:latest
    container_name: worker1
    hostname: worker1
    privileged: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
      - SETUID
      - SETGID
    # Phase 1 Fix: Workers should also have a safe working dir
    working_dir: /home/sandbox-user
    command: ["slurmd"]
    volumes:
      - etc_munge:/etc/munge
      - ./data:/data
      - ./data/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./storage/users:/mnt/storage/users
      - ./storage/projects:/mnt/storage/projects
      - ./storage/public:/mnt/storage/public
    networks:
      - slurm_net
    depends_on:
      - slurmctld

  worker2:
    <<: *worker_base
    container_name: worker2
    hostname: worker2

  worker3:
    <<: *worker_base
    container_name: worker3
    hostname: worker3

networks:
  slurm_net:
    driver: bridge
