volumes:
  etc_munge:
  slurm_state:

services:
  slurmctld:
    build:
      context: .
      dockerfile: Dockerfile.slurm
    image: local-slurm:latest
    container_name: slurmctld
    hostname: slurmctld
    privileged: true
    command: ["slurmctld"]
    volumes:
      - etc_munge:/etc/munge
      - slurm_state:/var/spool/slurmctld
      - ./data:/data                          # bind mount — host ./data = /data in container
      - ./data/slurm.conf:/etc/slurm/slurm.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    networks:
      - slurm_net

  worker1: &worker_base
    image: local-slurm:latest
    container_name: worker1
    hostname: worker1
    privileged: true
    command: ["slurmd"]
    volumes:
      - etc_munge:/etc/munge
      - ./data:/data                          # same bind mount on every worker
      - ./data/slurm.conf:/etc/slurm/slurm.conf:ro
    networks:
      - slurm_net
    depends_on:
      - slurmctld

  worker2:
    <<: *worker_base
    container_name: worker2
    hostname: worker2

  worker3:
    <<: *worker_base
    container_name: worker3
    hostname: worker3

networks:
  slurm_net:
    driver: bridge
