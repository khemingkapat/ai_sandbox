services:
  # The Head Node (Controller)
  slurmctld:
    image: slaclab/slurm-docker:22.05
    container_name: slurmctld
    hostname: slurmctld
    privileged: true
    # We use root user so the Resume/Suspend scripts can talk to Docker
    user: root 
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - slurm_net
    environment:
      # Tell the image to configure these nodes in slurm.conf automatically
      - SLURM_NODES=worker[1-3]
    # We override the command to ensure we are running as a controller
    command: >
      bash -c "apt-get update && apt-get install -y docker.io && 
               /usr/sbin/slurmctld -D -vvv"

  # The Compute Nodes (Workers) - Defined but not started by default
  worker1: &worker_base
    image: slaclab/slurm-docker:22.05
    container_name: worker1
    hostname: worker1
    volumes:
      - ./data:/data
    networks:
      - slurm_net
    profiles:
      - workers # This keeps them 'Off' until Slurm calls 'docker start'
    command: /usr/sbin/slurmd -D -vvv

  worker2:
    <<: *worker_base
    container_name: worker2
    hostname: worker2

  worker3:
    <<: *worker_base
    container_name: worker3
    hostname: worker3

networks:
  slurm_net:
    driver: bridge
