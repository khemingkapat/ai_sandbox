version: "3.8"

services:
  # Slurm Controller (Head Node)
  slurmctld:
    image: masterofminds/slurm-docker:latest
    hostname: slurmctld
    container_name: slurmctld
    privileged: true  # Necessary to run docker commands inside for "scaling"
    environment:
      - SLURM_NODES=worker[1-3]
    volumes:
      - shared-data:/data
      - /var/run/docker.sock:/var/run/docker.sock # Allows controller to start/stop other containers
    networks:
      - cluster_net

  # Slurm Workers (Pre-defined but will be managed dynamically)
  worker1:
    image: masterofminds/slurm-docker:latest
    hostname: worker1
    container_name: worker1
    volumes:
      - shared-data:/data
    networks:
      - cluster_net
    profiles: ["workers"] # Helps keep them organized

  worker2:
    image: masterofminds/slurm-docker:latest
    hostname: worker2
    container_name: worker2
    volumes:
      - shared-data:/data
    networks:
      - cluster_net
    profiles: ["workers"]

  worker3:
    image: masterofminds/slurm-docker:latest
    hostname: worker3
    container_name: worker3
    volumes:
      - shared-data:/data
    networks:
      - cluster_net
    profiles: ["workers"]

networks:
  cluster_net:
    driver: bridge

volumes:
  shared-data:
