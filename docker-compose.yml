services:
  slurmctld:
    image: slaclab/slurm-docker:22.05
    container_name: slurmctld
    hostname: slurmctld
    privileged: true
    user: root 
    volumes:
      - ./data:/data
      - ./data/slurm.conf:/etc/slurm/slurm.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - slurm_net
    environment:
      - SLURM_NODES=worker[1-3]
    command: >
      bash -c "apt-get update && apt-get install -y docker.io && 
               /usr/sbin/slurmctld -D -vvv"

  worker1: &worker_base
    image: slaclab/slurm-docker:22.05
    container_name: worker1
    hostname: worker1
    volumes:
      - ./data:/data
    networks:
      - slurm_net
    profiles:
      - workers 
    command: /usr/sbin/slurmd -D -vvv

  worker2:
    <<: *worker_base
    container_name: worker2

  worker3:
    <<: *worker_base
    container_name: worker3

networks:
  slurm_net:
    driver: bridge
