ClusterName=local_cluster
ControlMachine=slurmctld
ControlAddr=slurmctld

AuthType=auth/munge
CredType=cred/munge

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid

SlurmctldDebug=debug2
SlurmdDebug=debug2

SrunPortRange=60001-60100
SlurmctldPort=6817
SlurmdPort=6818

ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

JobAcctGatherType=jobacct_gather/none
AccountingStorageType=accounting_storage/none

NodeName=worker[1-3] CPUs=8 RealMemory=1000 State=UNKNOWN
PartitionName=debug Nodes=worker[1-3] Default=YES MaxTime=INFINITE State=UP
