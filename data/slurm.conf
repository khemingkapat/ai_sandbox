ClusterName=local_cluster
ControlMachine=slurmctld
ControlAddr=slurmctld

# Authentication
AuthType=auth/none
CredType=cred/none

# Essential Paths
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid

# Fix MailProg warning
MailProg=/usr/bin/true

# Network Adjustments (CRITICAL FIX)
# Increase time for containers to boot and install packages
ResumeTimeout=300
SuspendTimeout=300
# Force Slurm to look up addresses every time to fix DNS race conditions
CommunicationParameters=NoAddrCache

# Accounting
JobAcctGatherType=jobacct_gather/none
AccountingStorageType=accounting_storage/none

# Power Management
SuspendTime=60
ResumeProgram=/data/resume.sh
SuspendProgram=/data/suspend.sh

# Compute Nodes
NodeName=worker[1-3] State=CLOUD CPUs=1 RealMemory=500
PartitionName=debug Nodes=worker[1-3] Default=YES MaxTime=INFINITE State=UP
